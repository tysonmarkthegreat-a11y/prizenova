  var stdEmojis = ["🔥","💸","🎉","⚡","💰"];
  var vipEmojis = ["👑","🏆","💎","🌟","🔱"];

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function stdAmount() {
    var r = Math.random();
    if (r < 0.60) return Math.round(30  + Math.random() * 120);
    if (r < 0.90) return Math.round(150 + Math.random() * 200);
    return            Math.round(350 + Math.random() * 150);
  }

  function vipAmount() {
    var r = Math.random();
    if (r < 0.40) return Math.round(500  + Math.random() * 300);
    if (r < 0.75) return Math.round(800  + Math.random() * 400);
    return            Math.round(1200 + Math.random() * 300);
  }

  function buildMessage() {
    var isVip = Math.random() < 0.20;
    var name  = pick(firstNames) + " " + pick(lastNames);
    var game  = pick(games);
    if (isVip) {
      var amt = vipAmount();
      return { text: pick(vipEmojis) + " HIGHROLLER: " + name + " — $" + amt.toLocaleString() + " on " + game + "!", isVip: true  };
    } else {
      var amt = stdAmount();
      return { text: pick(stdEmojis) + " CASH OUT: " + name + " — $" + amt + " on " + game + "!", isVip: false };
    }
  }

  var pill = document.getElementById("alertPill");
  var txt  = document.getElementById("alertText");
  if (!pill || !txt) return;

  var prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if (prefersReducedMotion) { pill.style.transition = "none"; }

  /* ── Web Audio chime — mobile-safe ──────────────────────────────────
     iOS Safari & Android Chrome block AudioContext until a user gesture.
     Strategy:
       1. Create the AudioContext immediately (starts 'suspended' on mobile).
       2. On the very first touchstart/click anywhere, call ctx.resume().
          This is the gesture unlock that mobile browsers require.
       3. If a chime was queued while suspended, play it right after unlock.
       4. All subsequent chimes play normally since the context is running.
  ──────────────────────────────────────────────────────────────────── */
  var audioCtx = null;
  var audioUnlocked = false;
  var pendingChime = null; // stores isVip bool if a chime fired before unlock

  function initCtx() {
    if (audioCtx) return audioCtx;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch (e) { audioCtx = null; }
    return audioCtx;
  }

  function unlockAudio() {
    if (audioUnlocked) return;
    var ctx = initCtx();
    if (!ctx) return;
    ctx.resume().then(function () {
      audioUnlocked = true;
      // Play any chime that fired while we were still suspended
      if (pendingChime !== null) {
        playChimeNow(pendingChime);
        pendingChime = null;
      }
    });
  }

  // Attach unlock to the broadest possible gestures — covers tap, scroll-tap,
  // button press, link click. Passive: true keeps scroll performance intact.
  ['touchstart', 'touchend', 'mousedown', 'keydown', 'click'].forEach(function (evt) {
    document.addEventListener(evt, unlockAudio, { once: false, passive: true });
  });

  // Also try to init (not unlock) immediately — on desktop this often
  // succeeds straight away since there's no strict autoplay block.
  initCtx();
  if (audioCtx && audioCtx.state === 'running') { audioUnlocked = true; }

  function playChime(isVip) {
    var ctx = initCtx();
    if (!ctx) return;

    if (!audioUnlocked || ctx.state === 'suspended') {
      // Can't play yet — park it so it fires after the next gesture
      pendingChime = isVip;
      return;
    }
    playChimeNow(isVip);
  }

  function playChimeNow(isVip) {
    var ctx = audioCtx;
    if (!ctx || ctx.state !== 'running') return;
    var now = ctx.currentTime;

    // iPhone-style clean ding: single pure sine tone, fast attack, slow decay
    // No layering = no glitch/beating artifacts
    try {
      var freq = isVip ? 1047 : 1318; // VIP: C6 warm, Standard: E6 bright
      var osc  = ctx.createOscillator();
      var gain = ctx.createGain();
      var comp = ctx.createDynamicsCompressor(); // prevents clipping
      osc.connect(gain);
      gain.connect(comp);
      comp.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      // iPhone ding envelope: near-instant attack, smooth long decay
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.22, now + 0.008); // 8ms attack
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2); // 1.2s decay
      osc.start(now);
      osc.stop(now + 1.3);
      // For VIP: add a subtle lower harmonic 80ms later for richness
      if (isVip) {
        var osc2  = ctx.createOscillator();
        var gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(comp);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(523, now + 0.08); // C5
        gain2.gain.setValueAtTime(0, now + 0.08);
        gain2.gain.linearRampToValueAtTime(0.10, now + 0.09);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);
        osc2.start(now + 0.08);
        osc2.stop(now + 1.1);
      }
    } catch (e) {}
  }

  // Timing: randomly pick 4s, 5s, or 8s gap between alerts
  var GAPS = [4000, 5000, 8000];
  var HOLD = 4000;
  function gap() { return GAPS[Math.floor(Math.random() * GAPS.length)]; }

  function showAlert() {
    var msg = buildMessage();
    txt.textContent = msg.text;
    if (msg.isVip) {
      pill.classList.add("is-highroller");
      pill.style.borderColor = "#c9a84c";
    } else {
      pill.classList.remove("is-highroller");
      pill.style.borderColor = "";
    }
    pill.classList.add("is-visible");
    playChime(msg.isVip);
    setTimeout(function () {
      pill.classList.remove("is-visible");
      setTimeout(showAlert, gap());
    }, HOLD);
  }

  setTimeout(showAlert, 2500);
})();
</script>
